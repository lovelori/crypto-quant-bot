name: Crypto Quant — 每4小时自动运行

on:
  schedule:
    # 每4小时 (UTC时间, 对应北京时间 8:00/12:00/16:00/20:00/0:00/4:00)
    - cron: '0 */4 * * *'
  workflow_dispatch:  # 可手动触发

jobs:
  run-quant:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 检查模型缓存
        id: model-cache
        uses: actions/cache@v4
        with:
          path: |
            crypto_model.pt
            crypto_training.png
            crypto_backtest.png
          key: crypto-model-${{ github.run_id }}
          restore-keys: |
            crypto-model-

      - name: 运行量化程序
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python3 runner.py 2>&1

      - name: 上传模型文件 (作为artifact)
        uses: actions/upload-artifact@v4
        with:
          name: crypto-model
          path: |
            crypto_model.pt
            crypto_training.png
            crypto_backtest.png
          retention-days: 7
